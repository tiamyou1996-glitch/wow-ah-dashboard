<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoW AH Dashboard</title>
  <style>
    :root {
      --bg-0: #05070f;
      --bg-1: #080b17;
      --bg-2: #0d1123;
      --panel: #0e1226;
      --panel-soft: #141a33;
      --line: #232842;
      --line-soft: #31385e;
      --text: #f3f4fb;
      --muted: #9ea6c5;
      --accent: #a893ff;
      --accent-2: #7a6bff;
      --chip: #191e37;
      --chip-active: #2a3056;
      --chart-bg: #0c1123;
      --ok: #7ddfa2;
      --warn: #ffd38d;
      --shadow: 0 22px 56px rgba(1, 2, 8, 0.62);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-pill: 999px;
      --border-default: 1px solid var(--line);
      --border-strong: 1px solid var(--line-soft);
      --surface-0: #0f142b;
      --surface-1: #151b36;
      --surface-2: #1b2242;
      --state-hover: #20274c;
      --state-active-a: #6862ad;
      --state-active-b: #4a4f84;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 78% -20%, rgba(168, 137, 255, 0.22), transparent 42%),
        radial-gradient(circle at 12% 110%, rgba(119, 96, 255, 0.14), transparent 44%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1));
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap {
      width: min(1680px, calc(100vw - 24px));
      margin: 12px auto;
      min-height: calc(100vh - 24px);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: linear-gradient(180deg, rgba(10, 12, 24, 0.96), rgba(7, 9, 18, 0.97));
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 280px 1fr;
    }
    .sidebar {
      border-right: var(--border-default);
      background: linear-gradient(180deg, #0b0f20, #080b17);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      border: var(--border-default);
      background: linear-gradient(180deg, #10152d, #0c1125);
      border-radius: var(--radius-md);
      padding: 10px 12px;
    }
    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #b4a2ff, #7261ff);
      box-shadow: 0 0 0 3px rgba(168, 147, 255, 0.14);
    }
    .brand h1 {
      font-size: 16px;
      margin: 0;
      letter-spacing: .3px;
    }
    .brand .meta {
      margin-top: 2px;
      font-size: 11px;
    }
    .top-tabs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .top-tab {
      border: var(--border-default);
      border-radius: var(--radius-md);
      background: var(--surface-0);
      color: #c4cced;
      font-size: 16px;
      text-align: left;
      letter-spacing: 0.2px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all .18s ease;
    }
    .top-tab:hover {
      color: #eff2ff;
      border-color: var(--line-soft);
      background: var(--state-hover);
    }
    .top-tab.active {
      color: #f6f4ff;
      border-color: #5d62a0;
      background: linear-gradient(140deg, var(--state-active-a), var(--state-active-b));
      box-shadow: inset 0 1px 0 rgba(196, 180, 255, 0.34), 0 0 0 1px rgba(140, 130, 220, 0.2);
    }
    .side-foot {
      margin-top: auto;
      border: 1px solid #323961;
      border-radius: var(--radius-md);
      padding: 10px;
      background: linear-gradient(180deg, rgba(93, 77, 173, 0.28), rgba(45, 50, 96, 0.2));
    }
    .side-foot .meta { font-size: 11px; }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: linear-gradient(180deg, rgba(11, 14, 30, .78), rgba(8, 10, 20, .82));
    }
    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 10, 20, .74);
      backdrop-filter: blur(4px);
    }
    .header-left h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .2px;
    }
    .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .header-pill {
      border: 1px solid #363d65;
      background: #131935;
      color: #cfd7f5;
      border-radius: var(--radius-pill);
      padding: 8px 14px;
      font-size: 13px;
    }
    .sub-tabs {
      display: flex;
      justify-content: center;
      gap: 18px;
      align-items: center;
      background: rgba(15, 20, 40, .8);
      color: #c7d8ef;
      font-size: 16px;
      padding: 12px 14px 14px;
      border-bottom: var(--border-default);
    }
    .product-strip-wrap {
      border-bottom: var(--border-default);
      background: rgba(12, 17, 36, 0.9);
      padding: 8px 14px 10px;
    }
    .product-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: #555f93 #121833;
      padding-bottom: 4px;
    }
    .product-chip {
      border: 1px solid #3d456f;
      border-radius: 10px;
      background: #171d3a;
      color: #cfd6f4;
      height: 30px;
      line-height: 28px;
      padding: 0 12px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: all .16s ease;
      user-select: none;
    }
    .product-chip:hover {
      border-color: #646eaa;
      color: #eef2ff;
      background: #1e2548;
    }
    .product-chip.active {
      border-color: #7a7fc5;
      color: #f7f8ff;
      background: linear-gradient(180deg, #6a63ad, #4b4f84);
      box-shadow: inset 0 1px 0 rgba(234, 229, 255, 0.2);
    }
    .sub-tab {
      border: 1px solid transparent;
      background: transparent;
      font-size: 16px;
      font-weight: 600;
      color: #d3d9f4;
      padding: 8px 18px;
      min-height: 38px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .18s ease;
    }
    .sub-tab:hover {
      color: #f0f3ff;
      border-color: #4f5885;
      background: rgba(90, 99, 152, .16);
    }
    .sub-tab.active {
      color: #f7fbff;
      border-color: #8683b6;
      background: linear-gradient(180deg, #6d68a5, #555180);
      box-shadow:
        inset 0 1px 0 rgba(231, 225, 255, 0.2),
        0 3px 10px rgba(118, 105, 188, 0.24);
    }

    .page {
      padding: 16px;
      animation: pageFade .22s ease;
    }
    @keyframes pageFade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items: center;
      background: linear-gradient(180deg, #171c36, #11152b);
      color: var(--text);
      padding: 12px 14px;
      border: var(--border-strong);
      border-bottom: 0;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .left-tools { display: flex; gap: 16px; align-items: center; }
    .right-tools { display: flex; justify-content: flex-end; gap: 10px; align-items: center; }
    .tool-select {
      min-width: 220px;
      border: 1px solid #3a4267;
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 15px;
      background: var(--surface-1);
      color: #e9f2ff;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .tool-select:focus {
      border-color: #7078b6;
      box-shadow: 0 0 0 3px rgba(122, 112, 197, 0.2);
    }
    .tool-toggle {
      border: 1px solid #3f466d;
      border-radius: 10px;
      background: var(--chip);
      color: #d6dcf7;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 34px;
      padding: 0 12px;
      opacity: .92;
      transition: all .18s ease;
      box-shadow: inset 0 1px 0 rgba(220, 225, 255, 0.06);
    }
    .tool-toggle:hover { border-color: #6b74ad; color: #f3f6ff; }
    .tool-toggle.active {
      border-color: #7a7fc5;
      background: linear-gradient(180deg, var(--state-active-a), var(--state-active-b));
      color: #f5faff;
      opacity: 1;
      box-shadow:
        inset 0 1px 0 rgba(234, 229, 255, 0.2),
        0 3px 9px rgba(113, 98, 188, 0.22);
    }

    .chart-box {
      background:
        radial-gradient(circle at 82% -38%, rgba(163, 138, 255, 0.2), transparent 55%),
        linear-gradient(180deg, #11162d, var(--chart-bg));
      border: var(--border-strong);
      border-top: 0;
      padding: 0;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      overflow: hidden;
      position: relative;
    }
    .chart-box::before {
      content: "";
      position: absolute;
      left: 56px;
      right: 58px;
      top: 50px;
      bottom: 70px;
      background-image: radial-gradient(rgba(201, 190, 255, .34) 1.1px, transparent 1.1px);
      background-size: 9px 9px;
      opacity: .62;
      pointer-events: none;
    }
    .hover-mini {
      position: absolute;
      right: 12px;
      bottom: 40px;
      z-index: 12;
      min-width: 138px;
      border: 1px solid #464f79;
      border-radius: 10px;
      background: rgba(16, 22, 45, 0.9);
      box-shadow: 0 8px 24px rgba(5, 8, 20, .45);
      padding: 8px 10px;
      font-size: 12px;
      color: #d8def6;
      pointer-events: none;
    }
    .hover-mini .t { color: #aeb7db; margin-bottom: 4px; font-size: 11px; }
    .hover-mini .r { display: flex; justify-content: space-between; gap: 10px; line-height: 1.5; }
    .hover-mini .k { color: #aeb7db; }
    .hover-mini .v { color: #f3f6ff; font-weight: 600; }
    #mainChart { height: 740px; }

    .panel {
      margin-top: 14px;
      background:
        radial-gradient(circle at 95% -35%, rgba(151, 117, 255, 0.1), transparent 45%),
        linear-gradient(180deg, #141a34, #10142a);
      border: var(--border-strong);
      border-radius: var(--radius-md);
      padding: 14px 14px 16px;
      box-shadow: inset 0 1px 0 rgba(188, 198, 255, 0.08);
    }
    .panel h3 {
      margin: 0 0 10px;
      font-size: 17px;
      letter-spacing: 0.3px;
      color: #f0f7ff;
    }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .meta {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.2px;
    }
    .btn {
      border: 1px solid #4c537f;
      background: var(--surface-2);
      color: #e5f0ff;
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      cursor: pointer;
      transition: all .18s ease;
    }
    .btn:hover {
      border-color: #737bb8;
      background: #2a2f56;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    input, select, textarea {
      border: 1px solid #434a73;
      background: var(--surface-1);
      color: #e8f2ff;
      border-radius: var(--radius-sm);
      padding: 7px 9px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #7a82bf;
      box-shadow: 0 0 0 3px rgba(127, 121, 189, 0.22);
    }
    textarea { width: 100%; min-height: 96px; resize: vertical; font-family: Consolas, monospace; }
    .hidden { display: none !important; }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(260px, 1fr)); gap: 10px; }
    .calc-result {
      margin-top: 8px;
      border: 1px solid #465080;
      padding: 10px;
      border-radius: var(--radius-sm);
      background: #13172e;
      line-height: 1.5;
    }
    .good { color: var(--ok); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }

    @media (max-width: 980px) {
      .wrap {
        margin: 0;
        width: 100vw;
        border-radius: 0;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .top-tabs { flex-direction: row; flex-wrap: wrap; }
      .top-tab, .sub-tab { font-size: 14px; padding: 8px 12px; }
      .tool-toggle { font-size: 13px; }
      .product-chip { font-size: 12px; height: 28px; line-height: 26px; padding: 0 10px; }
      .tool-select { font-size: 14px; min-width: 130px; }
      .page { padding: 12px; }
      #mainChart { height: 460px; }
      .toolbar { grid-template-columns: 1fr; }
      .right-tools { justify-content: flex-start; }
      .grid-2 { grid-template-columns: 1fr; }
      .header-bar { padding: 10px 12px; }
      .header-right { gap: 6px; }
      .header-pill { padding: 7px 11px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge"></div>
        <div>
          <h1>AH Merchant</h1>
          <div class="meta">WoW 12.0 交易面板</div>
        </div>
      </div>
      <div class="top-tabs">
        <button id="tabAnalysis" class="top-tab active" type="button">行情分析</button>
        <button id="tabToolkit" class="top-tab" type="button">工具包</button>
        <button id="tabOther" class="top-tab" type="button">其他功能</button>
      </div>
      <div class="side-foot">
        <div style="font-size:13px;font-weight:600;">交易提示</div>
        <div class="meta">先看价量，再看链路，再定“卖原料/做加工”。</div>
      </div>
    </aside>

    <main class="main">
      <div class="header-bar">
        <div class="header-left">
          <h2>拍卖行经营看板</h2>
        </div>
        <div class="header-right">
          <span class="header-pill">CN / 单服</span>
          <span class="header-pill">实时追踪</span>
        </div>
      </div>

      <div id="analysisPage">
        <div class="sub-tabs">
          <button id="catFocus" class="sub-tab">关注</button>
          <button id="catHerb" class="sub-tab active">草药学</button>
          <button id="catIns" class="sub-tab">铭文</button>
          <button id="catOther" class="sub-tab">其他</button>
        </div>
        <div class="product-strip-wrap">
          <div id="productStrip" class="product-strip"></div>
        </div>

        <div class="page">
          <div class="toolbar">
            <div class="left-tools">
              <select id="productSel" class="tool-select"></select>
              <select id="rankSel" class="tool-select">
                <option value="all">星级选择: 全部</option>
                <option value="r1">星级选择: R1</option>
                <option value="r2">星级选择: R2</option>
              </select>
            </div>
            <div class="meta" id="analysisMeta">-</div>
            <div class="right-tools">
              <button id="toggleZone" class="tool-toggle active" type="button">高亮区间</button>
              <button id="toggleMA" class="tool-toggle active" type="button">平均线</button>
              <button id="toggleTrend" class="tool-toggle" type="button">趋势线</button>
            </div>
          </div>
          <div class="chart-box">
            <div id="mainChart"></div>
            <div id="hoverMini" class="hover-mini">
              <div class="t">库存</div>
              <div class="r"><span class="k">R1 Qty</span><span id="miniR1Qty" class="v">-</span></div>
              <div class="r"><span class="k">R2 Qty</span><span id="miniR2Qty" class="v">-</span></div>
            </div>
          </div>
        </div>
      </div>

      <div id="toolkitPage" class="hidden page">
        <section class="panel">
          <h3>加工对比计算器（原料零成本）</h3>
          <div class="meta">比较“直接卖原料”与“加工成下游后卖”。默认辅料按R1市场价采购，税率默认5%。</div>
          <div class="grid-2">
            <div>
              <div class="meta">原料</div>
              <select id="calcItemSel"></select>
            </div>
            <div>
              <div class="meta">原料品级</div>
              <select id="calcInputRank"><option value="1">R1</option><option value="2">R2</option></select>
            </div>
            <div>
              <div class="meta">原料数量</div>
              <input id="calcInputQty" type="number" min="1" step="1" value="100" />
            </div>
            <div>
              <div class="meta">成品品级</div>
              <select id="calcOutputRank"><option value="1">R1</option><option value="2">R2</option></select>
            </div>
            <div>
              <div class="meta">税率(%)</div>
              <input id="calcFeePct" type="number" min="0" max="20" step="0.1" value="5" />
            </div>
          </div>
          <div id="calcResult" class="calc-result">等待计算...</div>
        </section>
      </div>

      <div id="otherPage" class="hidden page">
        <section class="panel">
          <h3>本地快速导入（AHMerchant 文本）</h3>
          <div class="meta">导入数据保存在当前浏览器本地，刷新不丢。</div>
          <textarea id="importText" placeholder="粘贴 AHMercant Replicate Export 文本..."></textarea>
          <div class="row" style="margin-top:8px;">
            <button id="importBtn" class="btn" type="button">导入到本地</button>
            <button id="clearLocalBtn" class="btn" type="button">清空本地导入</button>
            <span id="importMeta" class="meta">本地导入记录：0 条</span>
          </div>
        </section>

        <section class="panel">
          <h3>事件标记</h3>
          <div class="grid-2">
            <div>
              <div class="meta">事件作用物品</div>
              <select id="eventItemSel"></select>
            </div>
            <div>
              <div class="meta">事件时间</div>
              <input id="eventTimeInput" type="datetime-local" />
            </div>
            <div>
              <div class="meta">事件标题</div>
              <input id="eventTitleInput" type="text" />
            </div>
            <div>
              <div class="meta">事件备注</div>
              <input id="eventNoteInput" type="text" />
            </div>
          </div>
          <div class="row" style="margin-top:8px;">
            <button id="eventAddBtn" class="btn" type="button">新增事件</button>
            <button id="eventDeleteBtn" class="btn" type="button">删除选中</button>
            <button id="eventExportBtn" class="btn" type="button">导出events.json</button>
            <button id="eventImportBtn" class="btn" type="button">导入events.json</button>
            <input id="eventImportFile" type="file" accept="application/json" class="hidden" />
          </div>
          <div style="margin-top:8px;">
            <div class="meta">已标记事件</div>
            <select id="eventListSel" size="6" style="width:100%;"></select>
            <div id="eventMeta" class="meta" style="margin-top:6px;">事件数：0</div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="./vendor/echarts.min.js"></script>
  <script src="./dashboard_data.js"></script>
  <script>
    (() => {
      const BASE_ROWS = (window.WOW_AH_DATA?.snapshots || []).map(r => ({
        item_name: String(r.item_name || ""),
        rank: Number(r.rank),
        price: Number(r.unit_price_gold),
        qty: Number(r.available_quantity),
        ts: String(r.observed_at || "")
      })).filter(r => r.item_name && Number.isFinite(r.rank) && Number.isFinite(r.price) && Number.isFinite(r.qty) && r.ts)
        .sort((a, b) => new Date(a.ts) - new Date(b.ts));

      const LOCAL_ROWS_KEY = "wow_ah_local_rows_v1";
      const EVENTS_KEY = "wow_ah_events_v1";
      const VIEW_TAB_KEY = "wow_ah_top_tab_v1";
      const CAT_KEY = "wow_ah_category_v1";

      const RECIPE = [
        { name: "猪黄墨水（白银叶路线）", output: "猪黄墨水", outMin: 2, mats: [{ item: "粉末颜料", q: 20 }, { item: "白银叶颜料", q: 10 }, { item: "法力百合颜料", q: 5 }] },
        { name: "标色墨水（血艳蓟路线）", output: "标色墨水", outMin: 2, mats: [{ item: "粉末颜料", q: 20 }, { item: "血艳蓟颜料", q: 10 }, { item: "法力百合颜料", q: 5 }] }
      ];

      const CAT_MAP = {
        focus: ["白银叶", "宁心花", "法力百合", "血艳蓟", "粉末颜料", "白银叶颜料", "法力百合颜料", "血艳蓟颜料", "猪黄墨水", "标色墨水"],
        herb: ["白银叶", "宁心花", "法力百合", "血艳蓟", "艾泽之根", "圣光微粒", "原始能量微粒"],
        ins: ["粉末颜料", "白银叶颜料", "法力百合颜料", "血艳蓟颜料", "编码艾泽之根", "猪黄墨水", "标色墨水", "灵魂密文"],
        other: []
      };

      const el = (id) => document.getElementById(id);
      const tabAnalysis = el("tabAnalysis");
      const tabToolkit = el("tabToolkit");
      const tabOther = el("tabOther");

      function fmtNum(v, digits = 4) {
        return Number(v).toLocaleString(undefined, { maximumFractionDigits: digits });
      }
      function setMiniQty(r1, r2) {
        miniR1Qty.textContent = r1 == null ? "-" : fmtNum(r1, 0);
        miniR2Qty.textContent = r2 == null ? "-" : fmtNum(r2, 0);
      }

      function loadLocalRows() {
        try {
          const raw = localStorage.getItem(LOCAL_ROWS_KEY);
          const arr = raw ? JSON.parse(raw) : [];
          return Array.isArray(arr) ? arr : [];
        } catch (_) { return []; }
      }
      function saveLocalRows() { localStorage.setItem(LOCAL_ROWS_KEY, JSON.stringify(state.localRows)); }
      function loadEvents() {
        try {
          const raw = localStorage.getItem(EVENTS_KEY);
          const arr = raw ? JSON.parse(raw) : [];
          return Array.isArray(arr) ? arr : [];
        } catch (_) { return []; }
      }
      function saveEvents() { localStorage.setItem(EVENTS_KEY, JSON.stringify(state.events)); }

      function rowsAll() {
        return [...BASE_ROWS, ...state.localRows].sort((a, b) => new Date(a.ts) - new Date(b.ts));
      }
      function latestPriceMap() {
        const m = new Map();
        rowsAll().forEach(r => m.set(`${r.item_name}|${r.rank}`, r.price));
        return m;
      }
      function uniqItems() {
        return [...new Set(rowsAll().map(r => r.item_name))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      }

      function toIndexed(rows, item) {
        const s = rows.filter(r => r.item_name === item);
        const ts = [...new Set(s.map(r => r.ts))].sort((a, b) => new Date(a) - new Date(b));
        const r1p = new Map(s.filter(r => r.rank === 1).map(r => [r.ts, r.price]));
        const r2p = new Map(s.filter(r => r.rank === 2).map(r => [r.ts, r.price]));
        const r1q = new Map(s.filter(r => r.rank === 1).map(r => [r.ts, r.qty]));
        const r2q = new Map(s.filter(r => r.rank === 2).map(r => [r.ts, r.qty]));
        return {
          ts,
          r1p: ts.map(t => r1p.has(t) ? r1p.get(t) : null),
          r2p: ts.map(t => r2p.has(t) ? r2p.get(t) : null),
          r1q: ts.map(t => r1q.has(t) ? r1q.get(t) : null),
          r2q: ts.map(t => r2q.has(t) ? r2q.get(t) : null)
        };
      }
      function ma(arr, n) {
        return arr.map((v, i) => {
          if (v == null) return null;
          let sum = 0, cnt = 0;
          for (let j = Math.max(0, i - n + 1); j <= i; j++) { if (arr[j] != null) { sum += arr[j]; cnt++; } }
          return cnt ? +(sum / cnt).toFixed(4) : null;
        });
      }
      function ema(arr, a) {
        let p = null;
        return arr.map(v => {
          if (v == null) return null;
          if (p == null) { p = v; return +v.toFixed(4); }
          p = a * v + (1 - a) * p;
          return +p.toFixed(4);
        });
      }
      function toMin(ts) {
        const t = String(ts).split(" ")[1] || "00:00:00";
        const [h, m] = t.split(":").map(Number);
        return (h || 0) * 60 + (m || 0);
      }
      function ranges(ts, pred) {
        const out = [];
        let st = null;
        for (let i = 0; i < ts.length; i++) {
          const ok = pred(ts[i], i);
          if (ok && st == null) st = ts[i];
          if ((!ok || i === ts.length - 1) && st != null) {
            out.push([st, ok && i === ts.length - 1 ? ts[i] : ts[Math.max(0, i - 1)]]);
            st = null;
          }
        }
        return out;
      }

      function eventsFor(item) {
        return state.events.filter(e => e.item === "*" || e.item === item);
      }

        barSeries.push({ name: "R2 Qty", type: "bar", data: idx.r2q, yAxisIndex: 1, z: 1, barMaxWidth: 9, itemStyle: { opacity: .1, color: "#b39dff" } });
        const series = [...barSeries, ...lineSeries];

        const markLineData = eventsFor(state.product).filter(e => idx.ts.includes(e.ts)).map(e => ({ xAxis: e.ts, name: e.title, label: { formatter: e.title, color: "#ffd166" }, lineStyle: { color: "#ffd166", type: "dashed" } }));
        const firstLine = series.find(s => s.type === "line");

        if (state.showZone) {

            ...ranges(idx.ts, t => { const m = toMin(t); return m >= 10 * 60 && m <= 16 * 60; }).map(([s, e]) => [{ xAxis: s }, { xAxis: e, itemStyle: { color: "rgba(106,151,255,0.10)" } }])
          ];
          const abnormal = ranges(idx.ts, (_, i) => {
            const d1 = idx.r1p[i] != null && r1ma[i] != null ? Math.abs(idx.r1p[i] - r1ma[i]) / (r1ma[i] || 1) : 0;
            const d2 = idx.r2p[i] != null && r2ma[i] != null ? Math.abs(idx.r2p[i] - r2ma[i]) / (r2ma[i] || 1) : 0;
            return Math.max(d1, d2) >= 0.18;

          const area = [...fixed, ...abnormal];

        mainChart.setOption({

            formatter: (params) => {
              if (!params || !params.length) return "";

              const pR1 = params.find(p => p.seriesName === "R1 Price" && p.data != null);

      function parsePrice(raw, txt) {
        const t = String(txt || "");
        const g = (t.match(/(\d+(?:\.\d+)?)\s*金/) || [])[1];
        const s = (t.match(/(\d+(?:\.\d+)?)\s*银/) || [])[1];
        if (g || s) return Number(g || 0) + Number(s || 0) / 100;
        const n = Number(raw);
        if (!Number.isFinite(n)) return NaN;
        if (Number.isInteger(n) && n >= 10000) return n / 10000;
        return n;
      }
      function parseNameRank(name) {
        const n = String(name || "").trim();
        const m = n.match(/^(.*?)(?:\s*[Rr]ank\s*(\d)|\((\d)\)|（(\d)）|\[(\d)\])$/);
        if (!m) return { item: n, rank: 1 };
        return { item: m[1].trim(), rank: Number(m[2] || m[3] || m[4] || m[5] || 1) };
      }
      function parseReplicateText(raw) {
        const lines = String(raw || "").replace(/\r/g, "").split("\n").map(v => v.trim()).filter(Boolean);
        const headerIdx = lines.findIndex(v => /itemID/i.test(v) && /name/i.test(v) && /listingCount/i.test(v));
        if (headerIdx < 0) return { rows: [], error: "未识别到导出表头" };
        const sep = lines[headerIdx].includes("\t") ? "\t" : (lines[headerIdx].includes("|") ? "|" : ",");
        const cols = lines[headerIdx].split(sep).map(v => v.trim());
        const idxName = cols.findIndex(v => /name/i.test(v));
        const idxPrice = cols.findIndex(v => /minUnitPrice$/i.test(v));
        const idxText = cols.findIndex(v => /minUnitPriceText/i.test(v));
        const idxCount = cols.findIndex(v => /listingCount/i.test(v));
        const tsLine = lines.find(v => /ScanTime/i.test(v));
        const mt = tsLine && tsLine.match(/(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})/);
        const ts = mt ? mt[1] : new Date().toISOString().slice(0, 19).replace("T", " ");

        const out = [];
        for (let i = headerIdx + 1; i < lines.length; i++) {
          const p = lines[i].split(sep).map(v => v.trim());
          if (p.length < cols.length) continue;
          const n = parseNameRank(p[idxName]);
          const qty = Number(p[idxCount]);
          const price = parsePrice(p[idxPrice], idxText >= 0 ? p[idxText] : "");
          if (!n.item || !Number.isFinite(qty) || !Number.isFinite(price)) continue;
          out.push({ item_name: n.item, rank: n.rank, price, qty, ts });
        }
        if (!out.length) return { rows: [], error: "没有解析到有效行" };
        return { rows: out, error: null };
      }

      function updateCalc() {
        const map = latestPriceMap();
        const item = calcItemSel.value;
        const inputRank = Number(calcInputRank.value || 1);
        const outRank = Number(calcOutputRank.value || 1);
        const own = Math.max(0, Number(calcInputQty.value || 0));
        const fee = Math.max(0, Math.min(20, Number(calcFeePct.value || 5))) / 100;
        const rawPrice = map.get(`${item}|${inputRank}`);
        if (!item || !rawPrice || own <= 0) {
          calcResult.textContent = "请先选择有价格的原料并输入数量";
          return;
        }
        const rawNet = own * rawPrice * (1 - fee);
        const rel = RECIPE.filter(r => r.mats.some(m => m.item === item));
        if (!rel.length) {
          calcResult.innerHTML = `当前未配置 <b>${item}</b> 的下游配方。<br/>直接卖原料净收入约：<b>${rawNet.toFixed(2)}g</b>`;
          return;
        }
        const lines = [`直接卖原料净收入：<b>${rawNet.toFixed(2)}g</b>`];
        rel.forEach(r => {
          const ownMat = r.mats.find(m => m.item === item);
          const crafts = own / ownMat.q;
          const outQty = crafts * r.outMin;
          const outPrice = map.get(`${r.output}|${outRank}`);
          if (!outPrice) {
            lines.push(`<span class="warn">${r.name}</span>：缺少成品 R${outRank} 价格`);
            return;
          }
          let otherCost = 0;
          let ok = true;
          for (const m of r.mats) {
            if (m.item === item) continue;
            const p = map.get(`${m.item}|1`);
            if (!p) { ok = false; break; }
            otherCost += crafts * m.q * p;
          }
          if (!ok) { lines.push(`<span class="warn">${r.name}</span>：缺少辅料R1价格`); return; }
          const processNet = outQty * outPrice * (1 - fee) - otherCost;
          const diff = processNet - rawNet;
          lines.push(`<span class="${diff >= 0 ? "good" : "warn"}">${r.name}</span>：加工净收益 <b>${processNet.toFixed(2)}g</b>，差额 ${diff >= 0 ? "+" : ""}${diff.toFixed(2)}g`);
        });
        calcResult.innerHTML = lines.join("<br/>");
      }

      function render() {
        renderTabs();
        refreshProductOptions();
        refreshEventItemOptions();
        drawMainChart();
        const allItems = uniqItems();
        if (!calcItemSel.options.length) {
          calcItemSel.innerHTML = allItems.map(i => `<option value="${i}">${i}</option>`).join("");
          if (allItems.includes("白银叶颜料")) calcItemSel.value = "白银叶颜料";
        }
        importMeta.textContent = `本地导入记录：${state.localRows.length} 条`;
        updateCalc();
      }

      state.localRows = loadLocalRows();
      state.events = loadEvents();
      refreshEventList();
      const now = new Date();
      const pad = n => String(n).padStart(2, "0");
      eventTimeInput.value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

      tabAnalysis.addEventListener("click", () => { state.top = "analysis"; render(); });
      tabToolkit.addEventListener("click", () => { state.top = "toolkit"; render(); });
      tabOther.addEventListener("click", () => { state.top = "other"; render(); });

      catFocus.addEventListener("click", () => { state.cat = "focus"; render(); });
      catHerb.addEventListener("click", () => { state.cat = "herb"; render(); });
      catIns.addEventListener("click", () => { state.cat = "ins"; render(); });
      catOther.addEventListener("click", () => { state.cat = "other"; render(); });

      productSel.addEventListener("change", () => { state.product = productSel.value; render(); });
      rankSel.addEventListener("change", () => { state.rankMode = rankSel.value; render(); });
      toggleZone.addEventListener("click", () => { state.showZone = !state.showZone; toggleZone.classList.toggle("active", state.showZone); drawMainChart(); });
      toggleMA.addEventListener("click", () => { state.showMA = !state.showMA; toggleMA.classList.toggle("active", state.showMA); drawMainChart(); });
      toggleTrend.addEventListener("click", () => { state.showTrend = !state.showTrend; toggleTrend.classList.toggle("active", state.showTrend); drawMainChart(); });
      toggleZone.classList.toggle("active", state.showZone);
      toggleMA.classList.toggle("active", state.showMA);
      toggleTrend.classList.toggle("active", state.showTrend);

      [calcItemSel, calcInputRank, calcInputQty, calcOutputRank, calcFeePct].forEach(x => {
        x.addEventListener("input", updateCalc);
        x.addEventListener("change", updateCalc);
      });

      importBtn.addEventListener("click", () => {
        const p = parseReplicateText(importText.value);
        if (p.error) { importMeta.textContent = `导入失败：${p.error}`; return; }
        const key = r => `${r.ts}|${r.item_name}|${r.rank}|${r.price}|${r.qty}`;
        const seen = new Set(state.localRows.map(key));
        let add = 0;
        p.rows.forEach(r => { const k = key(r); if (!seen.has(k)) { state.localRows.push(r); seen.add(k); add++; } });
        saveLocalRows();
        importMeta.textContent = `导入成功：${add} 条`;
        render();
      });
      clearLocalBtn.addEventListener("click", () => {
        state.localRows = [];
        saveLocalRows();
        render();
      });

      eventAddBtn.addEventListener("click", () => {
        const ts = (eventTimeInput.value || "").replace("T", " ") + ":00";
        const title = (eventTitleInput.value || "").trim();
        if (!eventTimeInput.value || !title) { eventMeta.textContent = "新增失败：时间和标题必填"; return; }
        state.events.push({ id: `${Date.now()}_${Math.random().toString(16).slice(2, 8)}`, ts, item: eventItemSel.value || "*", title, note: (eventNoteInput.value || "").trim() });
        saveEvents();
        refreshEventList();
        render();
      });
      eventDeleteBtn.addEventListener("click", () => {
        const id = eventListSel.value;
        if (!id) { eventMeta.textContent = "请先选择要删除的事件"; return; }
        state.events = state.events.filter(e => e.id !== id);
        saveEvents();
        refreshEventList();
        render();
      });
      eventExportBtn.addEventListener("click", () => {
        const blob = new Blob([JSON.stringify(state.events, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "events.json";
        a.click();
        URL.revokeObjectURL(a.href);
      });
      eventImportBtn.addEventListener("click", () => eventImportFile.click());
      eventImportFile.addEventListener("change", async () => {
        const f = eventImportFile.files && eventImportFile.files[0];
        if (!f) return;
        try {
          const text = await f.text();
          const arr = JSON.parse(text);
          if (!Array.isArray(arr)) throw new Error();
          state.events = arr;
          saveEvents();
          refreshEventList();
          render();
        } catch (_) {
          eventMeta.textContent = "导入失败：events.json格式不正确";
        } finally {
          eventImportFile.value = "";
        }
      });

      window.addEventListener("resize", () => mainChart.resize());
      mainChart.on("globalout", () => setMiniQty(null, null));
      render();
    })();
  </script>
</body>
</html>
